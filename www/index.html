<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#F2F0E9">
    <title>Vessel Journal</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icons/icon.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,500;0,600;1,400&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="assets/css/main.css">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>

    <!-- PIN LOCK OVERLAY -->
    <div id="pin-lock-overlay" class="pin-overlay hidden">
        <div class="pin-container">
            <i class="ri-lock-2-line pin-icon"></i>
            <h2 data-i18n="pin_enter">Enter PIN</h2>
            <div class="pin-dots" id="pin-dots">
                <span></span><span></span><span></span><span></span>
            </div>
            <div class="pin-keypad" id="pin-keypad">
                <button>1</button><button>2</button><button>3</button>
                <button>4</button><button>5</button><button>6</button>
                <button>7</button><button>8</button><button>9</button>
                <button class="empty"></button><button>0</button><button class="backspace"><i class="ri-delete-back-2-line"></i></button>
            </div>
        </div>
    </div>

    <div id="app">
        <!-- HEADER -->
        <header class="app-header">
            <h1 class="logo" data-i18n="app_title">Vessel.</h1>
            <div class="header-actions">
                <!-- Streak Badge -->
                <div id="streak-badge" class="streak-badge hidden">
                    <i class="ri-fire-line"></i> <span id="streak-count">0</span>
                </div>
            </div>
        </header>

        <!-- MAIN CONTENT AREA -->
        <main id="main-content">

            <!-- VIEW: HOME (List) -->
            <section id="view-home" class="view active">
                <!-- On This Day -->
                <div id="on-this-day-container"></div>

                <!-- Search -->
                <div class="search-wrapper">
                    <i class="ri-search-line search-icon"></i>
                    <input type="text" id="search-input" class="search-input" placeholder="Search memories..." data-i18n-placeholder="ph_search">
                </div>

                <!-- Entry List -->
                <div id="entry-list" class="entry-list"></div>

                <!-- Empty State -->
                <div id="empty-state" class="empty-state hidden">
                    <div class="empty-content">
                        <i class="ri-quill-pen-line"></i>
                        <p data-i18n="home_empty">Your story begins here...</p>
                    </div>
                </div>
            </section>

            <!-- VIEW: CALENDAR (New Split View) -->
            <section id="view-calendar" class="view">
                <h2 class="section-title" data-i18n="stats_calendar">Calendar</h2>
                <div class="stats-card">
                    <div class="calendar-header">
                        <button id="prev-month"><i class="ri-arrow-left-s-line"></i></button>
                        <span id="calendar-month-year"></span>
                        <button id="next-month"><i class="ri-arrow-right-s-line"></i></button>
                    </div>
                    <div class="calendar-grid" id="calendar-grid"></div>
                </div>
            </section>

            <!-- VIEW: STATS (Charts) -->
            <section id="view-stats" class="view">
                <h2 class="section-title" data-i18n="stats_moods">Mood Overview</h2>
                <div class="stats-card">
                    <div class="chart-container">
                        <div id="mood-pie-chart" class="pie-chart"></div>
                        <div id="mood-legend" class="chart-legend"></div>
                    </div>
                </div>
            </section>

            <!-- VIEW: SETTINGS -->
            <section id="view-settings" class="view">
                <div class="settings-container">
                    <h2 class="settings-title" data-i18n="settings_title">Preferences</h2>

                    <div class="setting-item">
                        <div class="setting-info">
                            <i class="ri-global-line"></i>
                            <span data-i18n="settings_lang">Language</span>
                        </div>
                        <select id="lang-select" class="setting-select">
                            <option value="en">English</option>
                            <option value="tr">Türkçe</option>
                            <option value="es">Español</option>
                        </select>
                    </div>

                    <div class="setting-item">
                        <div class="setting-info">
                            <i class="ri-contrast-2-line"></i>
                            <span data-i18n="settings_theme">Dark Theme</span>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="theme-switch">
                            <span class="slider round"></span>
                        </label>
                    </div>

                    <div class="setting-item">
                        <div class="setting-info">
                            <i class="ri-lock-password-line"></i>
                            <span data-i18n="settings_pin">App Lock (PIN)</span>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="pin-switch">
                            <span class="slider round"></span>
                        </label>
                    </div>

                    <hr class="divider">

                    <h2 class="settings-title" data-i18n="settings_backup">Backup</h2>

                    <button id="export-btn" class="action-btn">
                        <i class="ri-download-cloud-line"></i>
                        <span data-i18n="btn_export">Export Data</span>
                    </button>

                    <div class="import-wrapper">
                        <input type="file" id="import-file" accept=".json" hidden>
                        <button id="import-btn" class="action-btn secondary">
                            <i class="ri-upload-cloud-line"></i>
                            <span data-i18n="btn_import">Import Data</span>
                        </button>
                    </div>

                    <hr class="divider">

                    <h2 class="settings-title" data-i18n="settings_data">Data</h2>
                    <button id="clear-data-btn" class="danger-btn">
                        <i class="ri-delete-bin-line"></i>
                        <span data-i18n="settings_clear">Clear All Data</span>
                    </button>

                    <!-- Reverted Style Version Label -->
                    <div class="app-version">Vessel Journal v0.1 by aliden1z</div>
                </div>
            </section>

        </main>

        <!-- EDITOR MODAL -->
        <div id="editor-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <button class="text-btn" id="close-modal" data-i18n="btn_cancel">Cancel</button>
                    <span class="modal-title" id="modal-title" data-i18n="modal_new">New Entry</span>
                    <button class="text-btn primary" id="save-entry" data-i18n="btn_save">Save</button>
                </div>

                <div class="modal-body">
                    <div class="editor-meta">
                        <div class="editor-date" id="current-date"></div>
                        <button id="prompt-btn" class="prompt-btn" title="Generate Prompt"><i class="ri-magic-line"></i></button>
                    </div>

                    <div class="mood-selector">
                        <input type="radio" name="mood" id="mood-1" value="happy" checked>
                        <label for="mood-1" class="mood-btn"><i class="ri-emotion-happy-line"></i></label>
                        <input type="radio" name="mood" id="mood-2" value="calm">
                        <label for="mood-2" class="mood-btn"><i class="ri-emotion-normal-line"></i></label>
                        <input type="radio" name="mood" id="mood-3" value="sad">
                        <label for="mood-3" class="mood-btn"><i class="ri-emotion-sad-line"></i></label>
                        <input type="radio" name="mood" id="mood-4" value="excited">
                        <label for="mood-4" class="mood-btn"><i class="ri-emotion-line"></i></label>
                    </div>

                    <input type="text" id="entry-title" class="editor-input title" placeholder="Title..." data-i18n-placeholder="ph_title">

                    <div class="tags-input-container">
                        <i class="ri-hashtag tag-icon"></i>
                        <input type="text" id="entry-tags" class="editor-input tags" placeholder="Tags..." data-i18n-placeholder="ph_tags">
                    </div>

                    <textarea id="entry-content" class="editor-input content" placeholder="Write..." data-i18n-placeholder="ph_content"></textarea>
                </div>
            </div>
        </div>

        <!-- BOTTOM NAV (5 Columns for Perfect Centering) -->
        <nav class="bottom-nav">
            <button class="nav-btn active" data-target="home">
                <i class="ri-book-open-line"></i>
            </button>
            <button class="nav-btn" data-target="calendar">
                <i class="ri-calendar-line"></i>
            </button>

            <!-- FAB Container for Center Alignment -->
            <div class="nav-fab-wrapper">
                <button class="nav-btn fab" id="add-entry-btn">
                    <i class="ri-add-line"></i>
                </button>
            </div>

            <button class="nav-btn" data-target="stats">
                <i class="ri-pie-chart-line"></i>
            </button>
            <button class="nav-btn" data-target="settings">
                <i class="ri-settings-4-line"></i>
            </button>
        </nav>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js').catch(err => console.log(err));
        }
    </script>
</body>
</html>
